name: Auto Update News

on:
  # 定时触发：每天北京时间 08:00 (UTC 00:00)
  schedule:
    - cron: '0 0 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      news_title:
        description: '新闻标题'
        required: true
        type: string
      news_url:
        description: '原文链接'
        required: true
        type: string
      news_source:
        description: '新闻来源'
        required: true
        default: 'Reuters'
        type: string
      news_summary:
        description: '新闻摘要'
        required: true
        type: string
      overall_impact:
        description: '整体影响分析'
        required: true
        type: string
      huawei_impact:
        description: '对华为的影响分析'
        required: true
        type: string
      category:
        description: '分类'
        required: true
        default: 'appstore'
        type: choice
        options:
          - appstore
          - googleplay
          - dma
          - thirdparty
          - huawei
          - developer
      score:
        description: '重要性评分 (1-10)'
        required: true
        default: '7'
        type: string

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Add news (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          cat > scripts/pending_news.json << 'EOF'
          [
            {
              "title": "${{ github.event.inputs.news_title }}",
              "source": "${{ github.event.inputs.news_source }}",
              "sourceUrl": "${{ github.event.inputs.news_url }}",
              "summary": "${{ github.event.inputs.news_summary }}",
              "aiComment": {
                "overallImpact": "${{ github.event.inputs.overall_impact }}",
                "huaweiImpact": "${{ github.event.inputs.huawei_impact }}"
              },
              "publishDate": "$(date +%Y-%m-%d)",
              "score": ${{ github.event.inputs.score }},
              "category": "${{ github.event.inputs.category }}",
              "tags": ["${{ github.event.inputs.news_source }}"]
            }
          ]
          EOF
          python3 scripts/daily_news_check.py
          
      - name: Build site
        run: npm run build
        
      - name: Deploy to server
        # 这里需要根据您的实际部署方式配置
        # 例如：Kimi Deploy API, Vercel, Netlify 等
        run: |
          echo "请配置您的部署步骤"
          echo "当前构建输出在 dist/ 目录"
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
